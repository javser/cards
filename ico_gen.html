<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор иконок</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            background: #2c3e50;
            color: white;
            gap: 20px;
        }
        .preview {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .icon-preview {
            text-align: center;
        }
        canvas {
            border: 2px solid #ecf0f1;
            border-radius: 12px;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { filter: brightness(1.1); }
    </style>
</head>
<body>
    <h1>Генератор иконок для "Карточки"</h1>
    <div class="preview" id="preview"></div>
    <button onclick="downloadIcons()">Скачать иконки (ZIP)</button>
    
    <script>
        const SIZES = [192, 512];
        
        function generateIcon(size) {            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Фон
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, 0, size, size);
            
            // Паттерн рубашки карты
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = Math.max(2, size / 100);
            
            for (let i = -size; i < size * 2; i += size / 10) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i + size, size);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(i, size);
                ctx.lineTo(i + size, 0);
                ctx.stroke();
            }
            
            // Рамка
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = Math.max(4, size / 50);
            ctx.strokeRect(10, 10, size - 20, size - 20);
            
            // Символ карты
            ctx.fillStyle = '#ecf0f1';
            ctx.font = `bold ${size * 0.5}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🃏', size / 2, size / 2);
            
            return canvas;
        }
        
        function init() {
            const preview = document.getElementById('preview');
            SIZES.forEach(size => {
                const canvas = generateIcon(size);
                const div = document.createElement('div');
                div.className = 'icon-preview';
                div.innerHTML = `
                    <h3>${size}×${size}</h3>
                    <img src="${canvas.toDataURL('image/png')}" alt="icon-${size}">
                `;                preview.appendChild(div);
                canvas.dataset.size = size;
                canvas.dataset.url = canvas.toDataURL('image/png');
            });
        }
        
        async function downloadIcons() {
            const canvases = document.querySelectorAll('canvas');
            for (const canvas of canvases) {
                const size = canvas.dataset.size;
                const link = document.createElement('a');
                link.download = `icon-${size}.png`;
                link.href = canvas.dataset.url;
                link.click();
                await new Promise(r => setTimeout(r, 500));
            }
        }
        
        init();
    </script>
</body>
</html>
