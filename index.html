<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Игра Карточки - классическая игра на память">
    <meta name="theme-color" content="#2c3e50">
    <title>Карточки</title>
    <style>
        /* ============================================
           CSS VARIABLES & RESET
           ============================================ */
        :root {
            /* Colors */
            --color-bg-primary: #2c3e50;
            --color-bg-secondary: #34495e;
            --color-text-primary: #ecf0f1;
            --color-accent: #e74c3c;
            --color-success: #2ecc71;
            --color-muted: #7f8c8d;
            
            /* Spacing */
            --spacing-xs: 5px;
            --spacing-sm: 10px;
            --spacing-md: 20px;
            --spacing-lg: 40px;
            
            /* Timing */
            --timing-fast: 0.1s;
            --timing-normal: 0.6s;
            --timing-slow: 1s;
            
            /* Sizes */
            --size-card-gap: 10px;
            --size-card-radius: 8px;
            --size-button-width: 200px;
            --size-font-heading: 2.5rem;
            --size-font-button: 1.2rem;
        }

        /* Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ============================================
           BASE STYLES
           ============================================ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.5;
        }

        /* ============================================
           SCREENS
           ============================================ */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            padding: var(--spacing-md);
        }

        .screen--active {
            display: flex;
        }

        /* ============================================
           TYPOGRAPHY
           ============================================ */
        .heading {
            font-size: var(--size-font-heading);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: var(--spacing-lg);
            text-align: center;
        }

        /* ============================================
           BUTTONS
           ============================================ */
        .btn {
            background: var(--color-accent);
            color: var(--color-text-primary);
            border: none;
            padding: var(--spacing-md) var(--spacing-lg);
            font-size: var(--size-font-button);
            margin: var(--spacing-xs);
            border-radius: var(--size-card-radius);
            cursor: pointer;
            width: var(--size-button-width);
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform var(--timing-fast) ease;
            font-family: inherit;
            font-weight: 600;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:focus {
            outline: 3px solid var(--color-text-primary);
            outline-offset: 2px;
        }

        .btn--exit {
            background: var(--color-muted);
        }

        /* ============================================
           GAME GRID
           ============================================ */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--size-card-gap);
            padding: var(--spacing-sm);
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
        }

        /* ============================================
           CARD COMPONENT (BEM)
           ============================================ */
        .card {
            background-color: transparent;
            perspective: 1000px;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            position: relative;
        }

        .card__inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform var(--timing-normal);
            transform-style: preserve-3d;
            border-radius: var(--size-card-radius);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card--flipped .card__inner {
            transform: rotateY(180deg);
        }

        .card--matched .card__inner {
            box-shadow: 0 0 15px var(--color-success);
        }

        .card__face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: var(--size-card-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: var(--color-bg-primary);
        }

        .card__face--back {
            background-color: var(--color-bg-secondary);
            background-image: 
                repeating-linear-gradient(
                    45deg,
                    rgba(255, 255, 255, 0.1) 0px,
                    rgba(255, 255, 255, 0.1) 10px,
                    transparent 10px,
                    transparent 20px
                ),
                repeating-linear-gradient(
                    -45deg,
                    rgba(255, 255, 255, 0.1) 0px,
                    rgba(255, 255, 255, 0.1) 10px,
                    transparent 10px,
                    transparent 20px
                );
        }

        .card__face--front {
            background-color: var(--color-text-primary);
            transform: rotateY(180deg);
        }

        /* ============================================
           MODAL
           ============================================ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            padding: var(--spacing-md);
        }

        .modal--visible {
            display: flex;
        }

        .modal__title {
            color: var(--color-success);
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
            text-align: center;
        }

        .modal__text {
            color: var(--color-text-primary);
            font-size: 1.2rem;
            text-align: center;
        }

        /* ============================================
           ACCESSIBILITY
           ============================================ */
        @media (prefers-reduced-motion: reduce) {
            .card__inner {
                transition: none;
            }
            
            .btn {
                transition: none;
            }
        }

        @media (max-width: 480px) {
            :root {
                --size-font-heading: 2rem;
                --size-font-button: 1rem;
                --size-button-width: 160px;
            }
            
            .game-grid {
                width: 95vw;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <!-- Главное меню -->
    <section id="menu-screen" class="screen screen--active" aria-label="Главное меню">
        <h1 class="heading">Карточки</h1>
        <div class="menu-actions">
            <button class="btn" data-action="start" aria-label="Начать игру">Играть</button>
            <button class="btn btn--exit" data-action="exit" aria-label="Выйти из приложения">Выход</button>
        </div>
    </section>

    <!-- Экран игры -->
    <section id="game-screen" class="screen" aria-label="Игровое поле">
        <div class="game-grid" id="game-grid" role="grid" aria-label="Игровое поле 4 на 4"></div>
    </section>

    <!-- Модальное окно победы -->
    <div id="win-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="win-title">
        <h2 id="win-title" class="modal__title">Поздравляю!</h2>
        <p class="modal__text">Нажмите, чтобы продолжить</p>
    </div>

    <script>
        /**
         * @fileoverview Игра "Карточки" - классическая игра на память
         * @version 1.0.0
         */

        (function() {
            'use strict';

            // ============================================
            // CONSTANTS
            // ============================================
            const CONFIG = {
                GRID_SIZE: 4,
                TOTAL_PAIRS: 8,
                FLIP_DELAY: 1000,
                WIN_DELAY: 500,
                SELECTORS: {
                    MENU_SCREEN: '#menu-screen',
                    GAME_SCREEN: '#game-screen',
                    GAME_GRID: '#game-grid',
                    WIN_MODAL: '#win-modal'
                },
                CLASSES: {
                    SCREEN_ACTIVE: 'screen--active',
                    CARD_FLIPPED: 'card--flipped',
                    CARD_MATCHED: 'card--matched',
                    MODAL_VISIBLE: 'modal--visible'
                }
            };

            // ============================================
            // GAME STATE
            // ============================================
            const gameState = {
                flippedCards: [],
                matchedPairs: 0,
                isLocked: false
            };

            // ============================================
            // DOM ELEMENTS
            // ============================================
            const elements = {
                menuScreen: null,
                gameScreen: null,
                gameGrid: null,
                winModal: null
            };

            // ============================================
            // UTILITY FUNCTIONS
            // ============================================
            
            /**
             * Перемешивает массив методом Фишера-Йетса
             * @param {Array} array - Массив для перемешивания
             * @returns {Array} Перемешанный массив
             */
            function shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }

            /**
             * Создает массив пар чисел
             * @param {number} pairs - Количество пар
             * @returns {Array} Массив чисел
             */
            function createCardValues(pairs) {
                const values = Array.from({ length: pairs }, (_, i) => i + 1);
                return [...values, ...values];
            }

            // ============================================
            // GAME LOGIC
            // ============================================
            
            /**
             * Инициализирует игровое поле
             */
            function createBoard() {
                const deck = shuffleArray(createCardValues(CONFIG.TOTAL_PAIRS));
                
                elements.gameGrid.innerHTML = '';
                
                deck.forEach((value, index) => {
                    const card = createCardElement(value, index);
                    elements.gameGrid.appendChild(card);
                });
            }

            /**
             * Создает HTML элемент карты
             * @param {number} value - Значение карты
             * @param {number} index - Индекс карты
             * @returns {HTMLElement} Элемент карты
             */
            function createCardElement(value, index) {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.value = value;
                card.dataset.index = index;
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.setAttribute('aria-label', `Карта ${index + 1}`);
                
                card.innerHTML = `
                    <div class="card__inner">
                        <div class="card__face card__face--back"></div>
                        <div class="card__face card__face--front">${value}</div>
                    </div>
                `;
                
                card.addEventListener('click', handleCardClick);
                card.addEventListener('keydown', handleCardKeydown);
                
                return card;
            }

            /**
             * Обработчик клика по карте
             * @param {Event} event - Событие клика
             */
            function handleCardClick(event) {
                const card = event.currentTarget;
                flipCard(card);
            }

            /**
             * Обработчик клавиатуры для доступности
             * @param {KeyboardEvent} event - Событие клавиатуры
             */
            function handleCardKeydown(event) {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    const card = event.currentTarget;
                    flipCard(card);
                }
            }

            /**
             * Переворачивает карту
             * @param {HTMLElement} card - Элемент карты
             */
            function flipCard(card) {
                if (gameState.isLocked) return;
                if (card.classList.contains(CONFIG.CLASSES.CARD_FLIPPED)) return;

                card.classList.add(CONFIG.CLASSES.CARD_FLIPPED);
                gameState.flippedCards.push(card);

                if (gameState.flippedCards.length === 2) {
                    checkForMatch();
                }
            }

            /**
             * Проверяет совпадение двух карт
             */
            function checkForMatch() {
                gameState.isLocked = true;
                const [card1, card2] = gameState.flippedCards;
                const isMatch = card1.dataset.value === card2.dataset.value;

                if (isMatch) {
                    handleMatch(card1, card2);
                } else {
                    handleMismatch(card1, card2);
                }
            }

            /**
             * Обработка совпадения карт
             * @param {HTMLElement} card1 - Первая карта
             * @param {HTMLElement} card2 - Вторая карта
             */
            function handleMatch(card1, card2) {
                card1.classList.add(CONFIG.CLASSES.CARD_MATCHED);
                card2.classList.add(CONFIG.CLASSES.CARD_MATCHED);
                gameState.matchedPairs++;
                gameState.flippedCards = [];
                gameState.isLocked = false;

                if (gameState.matchedPairs === CONFIG.TOTAL_PAIRS) {
                    setTimeout(showWinModal, CONFIG.WIN_DELAY);
                }
            }

            /**
             * Обработка несовпадения карт
             * @param {HTMLElement} card1 - Первая карта
             * @param {HTMLElement} card2 - Вторая карта
             */
            function handleMismatch(card1, card2) {
                setTimeout(() => {
                    card1.classList.remove(CONFIG.CLASSES.CARD_FLIPPED);
                    card2.classList.remove(CONFIG.CLASSES.CARD_FLIPPED);
                    gameState.flippedCards = [];
                    gameState.isLocked = false;
                }, CONFIG.FLIP_DELAY);
            }

            // ============================================
            // UI FUNCTIONS
            // ============================================
            
            /**
             * Показывает модальное окно победы
             */
            function showWinModal() {
                elements.winModal.classList.add(CONFIG.CLASSES.MODAL_VISIBLE);
            }

            /**
             * Скрывает модальное окно и возвращает в меню
             */
            function hideWinModal() {
                elements.winModal.classList.remove(CONFIG.CLASSES.MODAL_VISIBLE);
                showScreen('menu');
                resetGame();
            }

            /**
             * Переключает экраны
             * @param {string} screenName - Название экрана ('menu' | 'game')
             */
            function showScreen(screenName) {
                elements.menuScreen.classList.toggle(
                    CONFIG.CLASSES.SCREEN_ACTIVE, 
                    screenName === 'menu'
                );
                elements.gameScreen.classList.toggle(
                    CONFIG.CLASSES.SCREEN_ACTIVE, 
                    screenName === 'game'
                );
            }

            /**
             * Сбрасывает состояние игры
             */
            function resetGame() {
                gameState.flippedCards = [];
                gameState.matchedPairs = 0;
                gameState.isLocked = false;
            }

            /**
             * Запускает игру
             */
            function startGame() {
                resetGame();
                createBoard();
                showScreen('game');
            }

            /**
             * Обработчик выхода из приложения
             */
            function exitApp() {
                const confirmed = confirm('Вы действительно хотите выйти?');
                if (confirmed) {
                    // Попытка закрыть окно (работает не во всех браузерах)
                    window.close();
                    
                    // Фолбэк: показываем сообщение
                    document.body.innerHTML = `
                        <div style="
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            height: 100vh;
                            color: white;
                            text-align: center;
                            padding: 20px;
                        ">
                            <div>
                                <h1>Приложение можно закрыть</h1>
                                <p>Нажмите кнопку "Назад" на устройстве</p>
                            </div>
                        </div>
                    `;
                }
            }

            // ============================================
            // EVENT DELEGATION
            // ============================================
            
            /**
             * Обрабатывает клики по меню
             * @param {Event} event - Событие клика
             */
            function handleMenuClick(event) {
                const button = event.target.closest('[data-action]');
                if (!button) return;

                const action = button.dataset.action;
                
                switch (action) {
                    case 'start':
                        startGame();
                        break;
                    case 'exit':
                        exitApp();
                        break;
                }
            }

            // ============================================
            // INITIALIZATION
            // ============================================
            
            /**
             * Инициализирует приложение
             */
            function init() {
                // Кэшируем DOM элементы
                elements.menuScreen = document.querySelector(CONFIG.SELECTORS.MENU_SCREEN);
                elements.gameScreen = document.querySelector(CONFIG.SELECTORS.GAME_SCREEN);
                elements.gameGrid = document.querySelector(CONFIG.SELECTORS.GAME_GRID);
                elements.winModal = document.querySelector(CONFIG.SELECTORS.WIN_MODAL);

                // Валидация
                if (!elements.menuScreen || !elements.gameScreen || !elements.gameGrid || !elements.winModal) {
                    console.error('Не все DOM элементы найдены');
                    return;
                }

                // Обработчики событий
                elements.menuScreen.addEventListener('click', handleMenuClick);
                elements.winModal.addEventListener('click', hideWinModal);

                // Обработка клавиши Escape для закрытия модального окна
                document.addEventListener('keydown', (event) => {
                    if (event.key === 'Escape' && 
                        elements.winModal.classList.contains(CONFIG.CLASSES.MODAL_VISIBLE)) {
                        hideWinModal();
                    }
                });

                console.log('Приложение "Карточки" инициализировано');
            }

            // Запуск после загрузки DOM
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
