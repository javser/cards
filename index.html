<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Игра Карточки - классическая игра на память">
    <meta name="theme-color" content="#2c3e50">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <title>Карточки</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Главное меню -->
    <section id="menu-screen" class="screen screen--active" aria-label="Главное меню">
        <h1 class="heading">Карточки</h1>
        <div class="menu-actions">
            <button class="btn" data-action="start" aria-label="Начать игру">Играть</button>
            <button class="btn btn--exit" data-action="exit" aria-label="Выйти из приложения">Выход</button>
        </div>
    </section>

    <!-- Экран игры -->
    <section id="game-screen" class="screen" aria-label="Игровое поле">
        <div class="game-grid" id="game-grid" role="grid" aria-label="Игровое поле 4 на 4"></div>
    </section>

    <!-- Модальное окно победы -->
    <div id="win-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="win-title">
        <h2 id="win-title" class="modal__title">Поздравляю!</h2>
        <p class="modal__text">Нажмите, чтобы продолжить</p>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
